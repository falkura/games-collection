<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link rel="icon" href="%OG_IMAGE%" />
    <title>%TITLE%</title>

    <meta name="description" content="%DESCRIPTION%" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="%TITLE%" />
    <meta property="og:description" content="%DESCRIPTION%" />
    <meta property="og:image" content="%OG_IMAGE%" />
    <meta property="og:url" content="%OG_URL%" />

    <style>
      html {
        overflow: hidden;
      }

      html,
      body,
      #root,
      #canvas {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        overscroll-behavior: none;
      }

      :root {
        /* Width reserved at the top-right corner for the Tweakpane panel. */
        --tweakpane-reserved: 56px;
      }

      #uiRoot {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      #uiRoot > * {
        pointer-events: auto;
      }

      .tp-dfwv {
        transition: width 0.18s ease;
        touch-action: pan-y;
      }

      .tp-dfwv:has(> .tp-rotv:not(.tp-rotv-expanded)) {
        width: 56px;
      }

      .tp-dfwv:has(> .tp-rotv:not(.tp-rotv-expanded)) .tp-rotv_b {
        padding-left: 8px;
        padding-right: 0;
        padding-top: 1px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <canvas id="canvas"></canvas>
    </div>
    <div id="uiRoot"></div>
  </body>
</html>
