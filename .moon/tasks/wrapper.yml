inheritedBy:
  layers: ["tool"]

tasks:
  build-assets:
    command: bunx assetpack -c @files(wrapper-assetpack)
    options:
      internal: true
      cache: false
  build-sources:
    command: bunx rspack build
    options:
      internal: true
      cache: false
  build:
    toolchains: ["bun"]
    deps:
      - ^:build
      - ~:build-assets
      - ~:build-sources
    inputs:
      - "@group(wrapper-sources)"

  dev-assets:
    command: bunx assetpack -w -c @files(wrapper-assetpack)
    options:
      persistent: true
      outputStyle: stream
      internal: true
  dev-sources:
    command: bunx rspack serve
    options:
      persistent: true
      outputStyle: stream
      internal: true
  dev:
    toolchains: ["bun"]
    deps:
      - ^:dev
      - ~:dev-assets
      - ~:dev-sources
    options:
      persistent: true
    inputs:
      - "@group(wrapper-sources)"

  assemble:
    script: |
      bunx moon run '#game:build' -f
      bunx moon run games-wrapper:build
    options:
      cache: false
    env:
      DEPLOYMENT: "true"
      # Set production to set __DEV__ to false
      NODE_ENV: "production"
