inheritedBy:
  layers: ["tool"]

tasks:
  build-assets:
    command: bunx --bun assetpack -c @files(wrapper-assetpack)
    inputs:
      - "assets/**/*"
      - "/packages/shared/assetpack/wrapper.ts"
      - "/packages/shared/assetpack/base.ts"
    outputs:
      - "/build/assets/**/*"
    options:
      internal: true
  build-sources:
    command: bunx --bun rspack build
    deps:
      - ^:build
      - ~:build-assets
    inputs:
      - "@group(wrapper-sources)"
      # Cache key must change when any game's dist (which the wrapper copies)
      # or any game.json (which generateGamesMeta reads) changes.
      - "/games/*/dist/**/*"
      - "/games/*/assets/game.json"
    outputs:
      - "/build/**/*"
    options:
      internal: true
  build:
    toolchains: ["bun"]
    deps:
      - ~:build-sources
    inputs:
      - "@group(wrapper-sources)"

  dev-assets:
    command: bunx --bun assetpack -w -c @files(wrapper-assetpack)
    options:
      persistent: true
      outputStyle: stream
      internal: true
  dev-sources:
    command: bunx --bun rspack serve
    deps:
      - ^:dev
    options:
      persistent: true
      outputStyle: stream
      internal: true
  dev:
    toolchains: ["bun"]
    deps:
      - ~:dev-assets
      - ~:dev-sources
    options:
      persistent: true
    inputs:
      - "@group(wrapper-sources)"
