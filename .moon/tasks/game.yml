inheritedBy:
  # All projects with layer application will get this tasks
  layers: ["application"]

tasks:
  # Build
  build-assets:
    command: bun --bun assetpack -c @files(game-assetpack)
    options:
      internal: true
      cache: false
  build-sources:
    command: bun --bun rspack build
    options:
      internal: true
      cache: false
  build:
    toolchains: ["bun"]
    deps:
      - ^:build
      - ~:build-assets
      - ~:build-sources
    inputs:
      - "@group(game-sources)"
    options:
      cache: false

  # Dev
  dev-assets:
    # @files(game-assetpack) is a path to assetpack config from all.yml
    command: bun --bun assetpack -w -c @files(game-assetpack)
    options:
      # Run in parallel
      persistent: true
      # Logs won't work without it
      outputStyle: stream
      internal: true
  dev-sources:
    command: bun --bun rspack serve
    options:
      persistent: true
      outputStyle: stream
      internal: true
  dev:
    toolchains: ["bun"]
    deps:
      # depends on dev from all packages in `dependsOn` array
      - ^:dev
      # depends on dev-assets here
      - ~:dev-assets
      # and dev-sources also here
      - ~:dev-sources
    options:
      persistent: true
    inputs:
      # React on changes in @group(game-sources) files
      - "@group(game-sources)"
